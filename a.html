<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chất Cách Điện - Trọng Nguyên</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --blue: #00f2fe; --bg: #0a0c10; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 380px; padding: 40px; border-right: 1px solid rgba(255,255,255,0.1); background: rgba(15, 18, 25, 0.8); backdrop-filter: blur(15px); z-index: 10; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9rem; }
        .stat-val { color: #666; font-family: monospace; }
        #display-area { flex: 1; position: relative; }
        #canvas-box { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div id="sidebar">
    <h2 style="color: var(--blue);">VẬT LÝ BÁN DẪN</h2>
    <p style="color: #555;">BÁO CÁO: TỔ 4</p>
    <hr style="border: 0.5px solid #222; margin: 20px 0;">
    <h3>Chất Cách Điện</h3>
    <div class="stat-row"><span>Vùng cấm (Eg):</span> <span class="stat-val">> 5 eV</span></div>
    <div class="stat-row"><span>Trạng thái:</span> <span class="stat-val">Bị khóa (Locked)</span></div>
    <p style="font-size: 0.85rem; color: #888; line-height: 1.6;">
        Khoảng cách vùng cấm rất rộng. Năng lượng nhiệt không đủ để electron vượt qua, khiến chất không dẫn điện.
    </p>
</div>
<div id="display-area"><div id="canvas-box"></div></div>
<script>
    let scene, camera, renderer, particles, crystal;
    function init() {
        const container = document.getElementById('canvas-box');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 1000);
        camera.position.set(8, 5, 10); camera.lookAt(0,0,0);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        crystal = new THREE.Mesh(new THREE.BoxGeometry(7, 4, 4, 5, 3, 3), new THREE.MeshBasicMaterial({ color: 0x222222, wireframe: true }));
        scene.add(crystal);
        const geo = new THREE.BufferGeometry(); const pos = [];
        for(let i=0; i<40; i++) pos.push((Math.random()-0.5)*6, (Math.random()-0.5)*3, (Math.random()-0.5)*3);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        particles = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.08, color: 0x444444 }));
        scene.add(particles);
        animate();
    }
    function animate() {
        requestAnimationFrame(animate);
        crystal.rotation.y += 0.001; renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
